<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b6bcb" />
  <title>Jakarta Transit</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    :root { --bg:#f6f7f9; --card:#fff; --accent:#0b6bcb; --line:#e3e6ea; --muted:#667; }
    * { box-sizing:border-box; }
    body { margin:0; font:16px/1.5 system-ui,sans-serif; background:var(--bg); color:#111;
           padding:16px; max-width:640px; margin-inline:auto; }
    h1 { font-size:1.25rem; margin:.2rem 0 1rem; display:flex; align-items:center; gap:.45rem; }
    .version { font-size:.72rem; color:var(--muted); border:1px solid var(--line);
               border-radius:6px; padding:.05rem .35rem; font-weight:600; }
    label { display:block; font-size:.85rem; color:var(--muted); margin:.6rem 0 .2rem; }
    input, button { width:100%; padding:.7rem .8rem; font-size:1rem; border-radius:10px;
                    border:1px solid var(--line); background:var(--card); }
    button { margin-top:1rem; background:var(--accent); color:#fff; border:0; font-weight:600; }
    button:active { opacity:.85; }
    .err { color:#b00020; font-size:.9rem; margin-top:.6rem; min-height:1.2rem; }
    .summary { font-weight:700; margin:1.2rem 0 .4rem; }
    .fare-warn { font-size:.9rem; color:#8a5a00; background:#fff7e6; border:1px solid #f0d28a;
                 border-radius:8px; padding:.55rem .7rem; margin:.2rem 0 .8rem; line-height:1.4; }
    .fare-warn:empty { display:none; }
    ol { list-style:none; padding:0; margin:0; }
    li { padding:.35rem 0; border-bottom:1px solid var(--line); }
    li.hop { color:var(--accent); font-weight:600; }
    li.start { font-weight:700; }
    li.end { font-weight:700; }
    li.stop { color:var(--muted); padding-left:1.2rem; font-size:.92rem; }
    .badge { display:inline-block; margin-left:.4rem; font-size:.72rem; font-weight:600;
             color:var(--muted); background:var(--bg); border:1px solid var(--line);
             border-radius:6px; padding:.05rem .4rem; vertical-align:middle; }
    .badge.brt { color:#fff; background:var(--accent); border-color:var(--accent); }
    .badge.snum { margin-left:0; color:var(--accent); background:var(--card);
                  border-color:var(--accent); font-variant-numeric:tabular-nums; }
    li.here { background:#e6f2ff; border-left:3px solid var(--accent);
              padding-left:.6rem; color:#111; font-weight:600; }
    li.xfer { color:var(--muted); font-size:.85rem; text-align:center; background:#eef3fb;
              border:0; border-radius:8px; margin:.35rem 0; padding:.45rem; }
    details summary { cursor:pointer; color:var(--accent); font-size:.92rem; }
    ol.mid { margin:.25rem 0 0; }
    ol.mid li { border:0; padding:.15rem 0 .15rem 1rem; }
    button.ghost { background:var(--card); color:var(--accent); border:1px solid var(--line);
                   font-weight:600; margin-top:.6rem; }
     .filters { display:flex; flex-wrap:wrap; gap:.35rem; margin:.75rem 0 .25rem; }
     .filters label { display:flex; align-items:center; gap:.25rem; width:auto; margin:0;
                      color:#111; font-size:.82rem; border:1px solid var(--line);
                      background:var(--card); border-radius:6px; padding:.25rem .4rem; }
     .filters input { width:auto; padding:0; }
     .hint { display:block; color:var(--muted); font-size:.8rem; margin-top:.4rem; min-height:1.1rem; }
     .route-selector { border-radius:8px; padding:.5rem 0; }
     .route-tabs { display:grid; grid-template-columns:1fr 1fr; gap:.35rem; }
     .route-tabs button { min-width:0; font-size:.85rem; padding:.45rem .35rem; margin-top:0;
                          background:var(--card); color:var(--muted); border:1px solid var(--line); }
     .route-tabs button.active { background:var(--accent); color:#fff; border-color:var(--accent); font-weight:700; }
     .report-box { margin-top:1rem; padding:.6rem .75rem; border:1px solid var(--line);
                   border-radius:8px; background:var(--card); font-size:.82rem;
                   color:var(--muted); }
     .report-links { display:flex; gap:.75rem; margin-top:.4rem; }
     .report-links a { color:var(--accent); font-weight:600; text-decoration:none; }
   </style>
</head>
<body>
  <h1>Jakarta Transit <span class="version" id="app-version"></span></h1>
  <label for="from">Naik dari halte</label>
  <input id="from" list="haltes" autocomplete="off" placeholder="cari halte…" />
  <label for="to">Turun di halte</label>
  <input id="to" list="haltes" autocomplete="off" placeholder="cari halte…" />
  <datalist id="haltes"></datalist>
  <button id="geo" class="ghost" type="button">📍 Urutkan halte dari lokasi saya</button>
  <small class="hint" id="geostat"></small>
  <div class="filters" id="service-filter"></div>
  <button id="go">Cari rute</button>
  <div class="err" id="err"></div>
  <div class="summary" id="summary"></div>
  <div class="fare-warn" id="fare-warn"></div>
  <button id="nav" class="ghost" type="button" hidden>🧭 Mulai navigasi</button>
  <small class="hint" id="navstat"></small>
  <ol id="result"></ol>
  <div id="report-box" class="report-box" hidden>
    <span>Rute terlihat janggal? Laporkan ke pengembang</span>
    <div class="report-links">
      <a href="https://t.me/kancutdragon" target="_blank" rel="noopener noreferrer">Telegram</a>
      <a href="https://instagram.com/anciet.pey" target="_blank" rel="noopener noreferrer">Instagram</a>
    </div>
  </div>

  <script src="router.js"></script>
  <script src="suggest.js"></script>
  <script src="legs.js"></script>
  <script src="livenav.js"></script>
  <script src="session.js"></script>
  <script src="cost.js"></script>
  <script src="app.js"></script>
</body>
</html>
